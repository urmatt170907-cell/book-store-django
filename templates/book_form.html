<a href="{% url 'book_list' %}">⬅️ Назад к списку книг</a>
<hr>
<h2>Добавить книгу</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <p>Название: <input type="text" name="title" required></p>
    <p>Автор: <input type="text" name="author" required></p>
    <p>Описание: <textarea name="description" required></textarea></p>
    <p>Цена: <input type="number" step="0.01" name="price" required></p>
    <p>Дата публикации: <input type="date" name="published_date" required></p>
    <p>Количество страниц: <input type="number" name="pages" required></p>
    <p>Бронь (от 1 до 5): <input type="number" name="reserved_count" min="1" max="5" required></p>
    <p>Промокод (не обязательно): <input type="text" name="discount_code"></p>
    <p>Обложка: <input type="file" name="cover_image"></p>
    <p>Файл книги: <input type="file" name="book_file"></p>
    <button type="submit">Сохранить книгу</button>
</form>
