{% extends 'cineboard/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="text-warning text-center">Регистрация</h2>
        <form method="post" class="mt-3">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-warning w-100">Зарегистрироваться</button>
        </form>
        <p class="text-center mt-2">Уже есть аккаунт? <a href="/accounts/login/" class="text-warning">Войти</a></p>
    </div>
</div>
{% endblock %}
