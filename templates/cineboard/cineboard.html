<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CineBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold text-warning" href="/cineboard/">🎬 CineBoard</a>
    <div class="ms-auto d-flex gap-2">
        <form action="/cineboard/search/" method="get" class="d-flex">
            <input name="q" class="form-control me-2" type="search" placeholder="Поиск...">
            <button class="btn btn-warning" type="submit">🔍</button>
        </form>
        {% if user.is_authenticated %}
            <a href="/cineboard/create/" class="btn btn-success">+ Фильм</a>
            <a href="/accounts/logout/" class="btn btn-outline-light">Выйти ({{ user.username }})</a>
        {% else %}
            <a href="/accounts/login/" class="btn btn-outline-light">Войти</a>
            <a href="/cineboard/register/" class="btn btn-warning">Регистрация</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
